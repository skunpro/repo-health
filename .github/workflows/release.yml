name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev

      - name: Build (release)
        run: cargo build --release

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $TARGET=(rustc -vV | Select-String '^host:' | ForEach-Object { $_.Line.Split(':')[1].Trim() })
          $TAG=$env:GITHUB_REF_NAME
          $NAME="repo-health-$TAG-$TARGET.exe"
          $LATEST="repo-health-windows.exe"
          Copy-Item target\release\repo-health.exe "dist\$NAME"
          Copy-Item target\release\repo-health.exe "dist\$LATEST"
          $HASH=(Get-FileHash -Algorithm SHA256 "dist\$NAME").Hash.ToLower()
          "$HASH  $NAME" | Out-File -FilePath "dist\SHA256SUMS-$TARGET.txt" -Encoding ascii
          "$HASH  $LATEST" | Out-File -FilePath "dist\SHA256SUMS-$TARGET.txt" -Encoding ascii -Append

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          TARGET="$(rustc -vV | sed -n 's/^host: //p')"
          TAG="${GITHUB_REF_NAME}"
          NAME="repo-health-$TAG-$TARGET"
          if [ "${RUNNER_OS}" = "Linux" ]; then LATEST="repo-health-linux"; else LATEST="repo-health-macos"; fi
          cp target/release/repo-health "dist/$NAME"
          cp target/release/repo-health "dist/$LATEST"
          (cd dist && (shasum -a 256 "$NAME" "$LATEST" > "SHA256SUMS-$TARGET.txt" 2>/dev/null || sha256sum "$NAME" "$LATEST" > "SHA256SUMS-$TARGET.txt"))

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-health-${{ runner.os }}
          path: dist/*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build SHA256SUMS.txt
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          find . -name 'SHA256SUMS-*.txt' -print0 | sort -z | xargs -0 cat > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
