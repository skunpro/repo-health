name: Feature request
description: Suggest an idea for repo-health
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like repo-health to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any context, examples, or screenshots.
    validations:
      required: false
