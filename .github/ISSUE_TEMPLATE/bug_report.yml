name: Bug report
description: Report a problem with repo-health
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Provide exact steps (and a sample repo if possible).
      placeholder: |
        1. Run repo-health ...
        2. Press ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output / logs
      description: Paste CLI output or screenshots. Redact secrets.
      render: text
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.0.2
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
